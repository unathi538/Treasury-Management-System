<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CommVault — Treasurer Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:#C0392B;--red-deep:#96281B;--red-muted:rgba(192,57,43,0.10);--red-glow:rgba(192,57,43,0.28);
      --green:#1A7A45;--green-bright:#22A05A;--green-muted:rgba(26,122,69,0.10);--green-glow:rgba(26,122,69,0.28);
      --white:#FFFFFF;--ivory:#F9F6F1;--parchment:#F2EDE5;
      --ink:#120E0A;--ink-mid:#3D3530;--ink-soft:#8A7F78;
      --line:rgba(18,14,10,0.08);--line-strong:rgba(18,14,10,0.14);
      --sidebar-w:240px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Syne',sans-serif;background:var(--ivory);color:var(--ink);overflow-x:hidden;}

    .scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .scene::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(-45deg,transparent,transparent 28px,rgba(18,14,10,0.018) 28px,rgba(18,14,10,0.018) 29px);}
    .wash{position:absolute;border-radius:50%;filter:blur(130px);}
    .wash-1{width:600px;height:600px;background:radial-gradient(circle,var(--red) 0%,transparent 70%);top:-200px;left:60px;opacity:.07;animation:breathe 18s ease-in-out infinite alternate;}
    .wash-2{width:500px;height:500px;background:radial-gradient(circle,var(--green) 0%,transparent 70%);bottom:-100px;right:-100px;opacity:.07;animation:breathe 22s ease-in-out infinite alternate-reverse;}
    @keyframes breathe{from{transform:scale(1);}to{transform:scale(1.12) translate(20px,12px);}}

    .app{position:relative;z-index:1;display:flex;min-height:100vh;}

    .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;opacity:0;animation:riseIn .6s .05s ease forwards;}
    .sidebar-brand{padding:28px 24px 24px;border-bottom:1px solid rgba(255,255,255,.08);}
    .brand-mark{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .brand-seal{width:40px;height:40px;background:rgba(255,255,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;}
    .brand-seal::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);}
    .seal-ring{width:16px;height:16px;border:2px solid rgba(255,255,255,.85);border-radius:50%;position:relative;z-index:1;}
    .seal-ring::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--red);border-radius:50%;}
    .brand-text{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--white);line-height:1;}
    .brand-text em{font-style:normal;color:var(--red);}
    .brand-sub{font-size:.58rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:3px;}

    .sidebar-nav{flex:1;padding:20px 12px;}
    .nav-section-label{font-size:.55rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:10px 12px 8px;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:8px;cursor:pointer;transition:background .18s,color .18s;margin-bottom:2px;text-decoration:none;color:rgba(255,255,255,.55);font-size:.82rem;font-weight:600;letter-spacing:.3px;}
    .nav-item:hover{background:rgba(255,255,255,.07);color:var(--white);}
    .nav-item.active{background:rgba(192,57,43,.2);color:var(--white);}
    .nav-item.active .nav-icon{color:var(--red);}
    .nav-icon{flex-shrink:0;color:rgba(255,255,255,.35);transition:color .18s;}
    .nav-item:hover .nav-icon{color:rgba(255,255,255,.7);}

    .sidebar-footer{padding:16px 12px 24px;border-top:1px solid rgba(255,255,255,.08);}
    .sidebar-back{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.45);font-size:.78rem;font-weight:600;letter-spacing:.3px;text-decoration:none;transition:all .18s;}
    .sidebar-back:hover{background:rgba(255,255,255,.06);color:var(--white);}

    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 36px;border-bottom:1px solid var(--line-strong);background:rgba(249,246,241,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50;opacity:0;animation:riseIn .6s .1s ease forwards;}
    .topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:700;color:var(--ink);}
    .topbar-sub{font-size:.7rem;color:var(--ink-soft);margin-top:2px;}
    .btn-connect{display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:var(--white);font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border:none;border-radius:6px;padding:11px 18px;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
    .btn-connect::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red-deep),var(--red));opacity:0;transition:opacity .25s;}
    .btn-connect:hover::before{opacity:1;}
    .btn-connect:hover{transform:translateY(-1px);box-shadow:0 6px 22px var(--red-glow);}
    .btn-connect>*{position:relative;z-index:1;}
    .conn-pip{width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:sonar 2.4s infinite;}
    @keyframes sonar{0%{box-shadow:0 0 0 0 rgba(74,222,128,.7);}70%{box-shadow:0 0 0 7px rgba(74,222,128,0);}100%{box-shadow:0 0 0 0 rgba(74,222,128,0);}}

    .content{padding:36px 36px 80px;display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start;}

    .liquidity-card{background:var(--white);border:1px solid var(--line-strong);border-radius:18px;padding:32px 36px;display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:28px;grid-column:1/-1;opacity:0;animation:riseIn .6s .18s ease forwards;position:relative;overflow:hidden;}
    .liquidity-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--green-bright));}
    .liq-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px;}
    .liq-balance{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;color:var(--green);line-height:1;display:flex;align-items:baseline;gap:10px;}
    .liq-balance-val{transition:all .4s;}
    .liq-trend{font-size:.8rem;font-weight:700;color:var(--green-bright);margin-left:4px;}
    .liq-updated{font-size:.7rem;color:var(--ink-soft);margin-top:8px;}
    .liq-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .btn-withdraw{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--red-deep),var(--red));color:var(--white);font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border:none;border-radius:8px;padding:15px 24px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 18px var(--red-glow);}
    .btn-withdraw:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--red-glow);}
    .btn-withdraw:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:0 4px 18px var(--red-glow);}

    .withdraw-group{display:flex;align-items:flex-end;gap:12px;}
    .withdraw-field-wrap{display:flex;flex-direction:column;gap:7px;}
    .withdraw-field-label{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);}
    .withdraw-input-inner{position:relative;}
    .withdraw-input-inner input{
      width:160px;background:var(--ivory);border:1.5px solid var(--line-strong);border-radius:8px;
      padding:13px 38px 13px 14px;font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:500;color:var(--ink);
      outline:none;transition:border-color .2s,box-shadow .2s,background .2s;-moz-appearance:textfield;
    }
    .withdraw-input-inner input::-webkit-outer-spin-button,
    .withdraw-input-inner input::-webkit-inner-spin-button{-webkit-appearance:none;}
    .withdraw-input-inner input::placeholder{color:var(--ink-soft);opacity:.45;}
    .withdraw-input-inner input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow);background:var(--white);}
    .withdraw-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.75rem;font-weight:700;color:var(--ink-soft);pointer-events:none;}

    .left-col{display:flex;flex-direction:column;gap:24px;}

    .panel{background:var(--white);border:1px solid var(--line-strong);border-radius:16px;overflow:hidden;}
    .panel-head{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--line);}
    .panel-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--ink);}
    .proposals-badge{font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:4px;background:var(--red-muted);color:var(--red);border:1px solid rgba(192,57,43,.2);}

    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead tr{border-bottom:1px solid var(--line);}
    thead th{padding:12px 20px;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft);text-align:left;white-space:nowrap;}
    tbody tr{border-bottom:1px solid var(--line);transition:background .15s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:var(--ivory);}
    tbody td{padding:14px 20px;font-size:.82rem;color:var(--ink-mid);vertical-align:middle;}

    .requester-cell{display:flex;align-items:center;gap:10px;}
    .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--ink-mid),var(--ink));display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:var(--white);flex-shrink:0;font-family:'Syne',sans-serif;}
    .requester-name{font-weight:600;color:var(--ink);}

    .amount-cell{font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--ink);}
    .date-cell{font-size:.75rem;color:var(--ink-soft);}

    .status-badge{display:inline-flex;align-items:center;gap:5px;font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:99px;}
    .status-pending{background:rgba(245,158,11,.12);color:#B45309;border:1px solid rgba(245,158,11,.25);}
    .status-approved{background:var(--green-muted);color:var(--green);border:1px solid rgba(26,122,69,.2);}
    .status-rejected{background:var(--red-muted);color:var(--red);border:1px solid rgba(192,57,43,.2);}

    .btn-review{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.5px;color:var(--green);background:var(--green-muted);border:1px solid rgba(26,122,69,.2);border-radius:6px;padding:7px 14px;cursor:pointer;transition:all .18s;}
    .btn-review:hover{background:var(--green);color:var(--white);}

    .loading-row td{padding:28px 20px;text-align:center;}
    .loading-dots{display:inline-flex;gap:6px;align-items:center;}
    .loading-dots span{width:7px;height:7px;border-radius:50%;background:var(--green-bright);animation:blink 1.2s infinite;}
    .loading-dots span:nth-child(2){animation-delay:.2s;}
    .loading-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

    .audit-list{padding:6px 0;}
    .audit-item{display:flex;align-items:flex-start;gap:12px;padding:14px 24px;border-bottom:1px solid var(--line);transition:background .15s;}
    .audit-item:last-child{border-bottom:none;}
    .audit-item:hover{background:var(--ivory);}
    .audit-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .audit-dot-green{background:var(--green-muted);color:var(--green);}
    .audit-dot-red{background:var(--red-muted);color:var(--red);}
    .audit-dot-ink{background:rgba(18,14,10,.07);color:var(--ink-mid);}
    .audit-dot-amber{background:rgba(245,158,11,.1);color:#B45309;}
    .audit-title{font-size:.82rem;font-weight:600;color:var(--ink);margin-bottom:3px;}
    .audit-desc{font-size:.73rem;color:var(--ink-soft);line-height:1.45;}
    .audit-desc strong{color:var(--ink-mid);font-weight:600;}
    .audit-time{font-size:.65rem;color:var(--ink-soft);margin-top:4px;letter-spacing:.3px;}

    .right-col{display:flex;flex-direction:column;gap:24px;}
    .right-col .panel{opacity:0;animation:riseIn .6s .28s ease forwards;}

    @keyframes riseIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    @media(max-width:900px){
      .content{grid-template-columns:1fr;}
      .liquidity-card{flex-direction:column;align-items:flex-start;}
    }
    @media(max-width:700px){
      .sidebar{transform:translateX(-100%);}
      .main{margin-left:0;}
    }
  </style>
</head>
<body>

<div class="scene">
  <div class="wash wash-1"></div>
  <div class="wash wash-2"></div>
</div>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <a href="index.html" class="brand-mark">
        <div class="brand-seal"><div class="seal-ring"></div></div>
        <div>
          <div class="brand-text">Comm<em>Vault</em></div>
          <div class="brand-sub">Treasurer Office</div>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Management</div>
      <a href="treasurer.html" class="nav-item active" id="nav-withdrawals">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        Withdrawals
      </a>
      <a href="audit-logs.html" class="nav-item" id="nav-auditlogs">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </span>
        Audit Logs
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Main Site
      </a>
    </div>
  </aside>

  <div class="main">

    <header class="topbar">
      <div>
        <div class="topbar-title">Withdrawal Management</div>
        <div class="topbar-sub">Review and process community withdrawal requests</div>
      </div>
      <button class="btn-connect" onclick="connectWallet()">
        <div class="conn-pip"></div>
        <span>Connect Wallet</span>
      </button>
    </header>

    <div class="content">

      <div class="liquidity-card">
        <div class="liq-left">
          <div class="liq-eyebrow">Total Liquidity Available</div>
          <div class="liq-balance">
            <!-- ✅ keep id as poolBalance (your app.js already uses this id elsewhere) -->
            <span class="liq-balance-val" id="poolBalance">—</span>
            <span class="liq-trend" id="liqTrend"></span>
          </div>
          <div class="liq-updated" id="liqUpdated">Fetching live data…</div>
        </div>
        <div class="liq-right">
          <div class="withdraw-group">
            <div class="withdraw-field-wrap">
              <label class="withdraw-field-label">Amount (ADA)</label>
              <div class="withdraw-input-inner">
                <input
                  type="number"
                  id="withdrawAmount"
                  placeholder="0"
                  min="1"
                  step="1"
                  oninput="onWithdrawInput(this)"
                />
                <span class="withdraw-unit">&#8371;</span>
              </div>
            </div>
            <button class="btn-withdraw" id="btnWithdraw" onclick="withdraw()" disabled>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Withdraw Funds
            </button>
          </div>
        </div>
      </div>

      <div class="left-col">

        <div class="panel" style="opacity:0;animation:riseIn .6s .24s ease forwards;">
          <div class="panel-head">
            <div class="panel-title">Pending Withdrawal Requests</div>
            <span class="proposals-badge" id="proposalsBadge">Loading…</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Requester</th>
                  <th>Amount</th>
                  <th>Purpose</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="requestsTableBody">
                <tr class="loading-row">
                  <td colspan="6">
                    <div class="loading-dots">
                      <span></span><span></span><span></span>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

      <div class="right-col">

        <div class="panel" style="opacity:0;animation:riseIn .6s .28s ease forwards;">
          <div class="panel-head">
            <div class="panel-title">Recent Activity</div>
          </div>
          <!-- ✅ keep id as recentTransactions (your markup already uses it) -->
          <div class="audit-list" id="recentTransactions">
            <div style="padding:28px;text-align:center;">
              <div class="loading-dots"><span></span><span></span><span></span></div>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<script>
  (async function guardTreasurer() {
    try {
      const res = await fetch('/backend/api/treasurers/me.php', { cache: 'no-store' });
      const out = await res.json();
      if (!out.logged_in) {
        window.location.href = 'treasurer-login.php';
      }
    } catch {
      window.location.href = 'treasurer-login.php';
    }
  })();
</script>

<script>
  // --------- CONFIG ----------
  const POOL_ID = "main";

  // Update these ONLY if your backend filenames differ:
  const ENDPOINT_STATS     = `/backend/api/stats.php?pool_id=${encodeURIComponent(POOL_ID)}`;
  const ENDPOINT_REQUESTS  = `/backend/api/transactions/list.php?pool_id=${encodeURIComponent(POOL_ID)}&status=pending`;
  const ENDPOINT_RECENT    = `/backend/api/transactions/recent.php?pool_id=${encodeURIComponent(POOL_ID)}&limit=10`;

  // --------- HELPERS ----------
  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function avatarInitials(name) {
    const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
    return (parts[0]?.[0] ?? "?") + (parts[1]?.[0] ?? "");
  }

  function statusBadge(status) {
    const map = {
      pending:  ['status-pending',  'Pending'],
      approved: ['status-approved', 'Approved'],
      rejected: ['status-rejected', 'Rejected'],
    };
    const [cls, label] = map[status] || ['status-pending', status];
    return `<span class="status-badge ${cls}">${label}</span>`;
  }

  function activityIcon(type) {
    const icons = {
      contribution: { cls: 'audit-dot-green', svg: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' },
      withdrawal:   { cls: 'audit-dot-red',   svg: '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>' },
      request:      { cls: 'audit-dot-amber', svg: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>' },
      approval:     { cls: 'audit-dot-green', svg: '<polyline points="20 6 9 17 4 12"/>' },
    };
    const i = icons[type] || icons.request;
    return `<div class="audit-dot ${i.cls}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${i.svg}</svg></div>`;
  }

  function lovelaceToAda(l) {
    const n = Number(l ?? 0);
    return n / 1_000_000;
  }

  function fmtAdaFromLovelace(l) {
    return lovelaceToAda(l).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  async function apiGet(url) {
    const res = await fetch(url, { credentials: "same-origin" });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { throw new Error(`Bad JSON from ${url}: ${text.slice(0,120)}`); }
    if (!res.ok || data?.ok === false) {
      throw new Error(data?.error || `Request failed (${res.status})`);
    }
    return data;
  }

  // --------- RENDER ----------
  function renderTreasurerDashboard({ poolBalanceAdaText, poolTrend, lastUpdated, pendingRequests, recentActivity }) {
    // pool balance
    const balEl = document.getElementById("poolBalance");
    if (balEl) balEl.textContent = poolBalanceAdaText ?? "—";

    const trendEl = document.getElementById("liqTrend");
    if (trendEl) {
      if (typeof poolTrend === "number") {
        const sign = poolTrend >= 0 ? "+" : "";
        trendEl.textContent = `↑${sign}${poolTrend}%`;
        trendEl.style.color = poolTrend >= 0 ? "var(--green-bright)" : "var(--red)";
      } else {
        trendEl.textContent = "";
      }
    }

    const updEl = document.getElementById("liqUpdated");
    if (updEl) updEl.textContent = lastUpdated ? `Last updated: ${lastUpdated}` : "Last updated: just now";

    // pending requests
    const badge = document.getElementById("proposalsBadge");
    const tbody = document.getElementById("requestsTableBody");

    if (Array.isArray(pendingRequests)) {
      if (badge) badge.textContent = `${pendingRequests.length} Active Proposal${pendingRequests.length !== 1 ? "s" : ""}`;

      if (tbody) {
        if (pendingRequests.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="6" style="padding:36px;text-align:center;font-size:.82rem;color:var(--ink-soft);font-style:italic;">
                No withdrawal requests at this time.
              </td>
            </tr>`;
        } else {
          tbody.innerHTML = pendingRequests.map(req => `
            <tr>
              <td>
                <div class="requester-cell">
                  <div class="avatar">${escapeHtml(avatarInitials(req.fullName))}</div>
                  <span class="requester-name">${escapeHtml(req.fullName)}</span>
                </div>
              </td>
              <td class="amount-cell">${escapeHtml(req.amountAda)} ADA</td>
              <td>${escapeHtml(req.purpose || req.category || "—")}</td>
              <td class="date-cell">${escapeHtml(req.date)}</td>
              <td>${statusBadge(req.status)}</td>
              <td>
                <button class="btn-review" onclick="openReview('${escapeHtml(req.id)}')">Review</button>
              </td>
            </tr>
          `).join("");
        }
      }
    }

    // recent activity
    const list = document.getElementById("recentTransactions");
    if (list) {
      if (!Array.isArray(recentActivity) || recentActivity.length === 0) {
        list.innerHTML = `
          <div style="padding:24px;text-align:center;font-size:.78rem;color:var(--ink-soft);font-style:italic;">
            No recent activity.
          </div>`;
      } else {
        list.innerHTML = recentActivity.map(a => `
          <div class="audit-item">
            ${activityIcon(a.type)}
            <div>
              <div class="audit-title">${escapeHtml(a.title)}</div>
              <div class="audit-desc">${escapeHtml(a.description)}</div>
              <div class="audit-time">${escapeHtml(a.time)}</div>
            </div>
          </div>
        `).join("");
      }
    }
  }

  // --------- LOAD FROM BACKEND ----------
  async function loadTreasurerDashboard() {
    // 1) stats
    // const stats = await apiGet(ENDPOINT_STATS);
    // const poolBalanceAdaText = fmtAdaFromLovelace(stats.pool_balance_lovelace);

    // 2) pending withdrawal requests
    const reqRes = await apiGet(ENDPOINT_REQUESTS);
    const rawReqs = reqRes.requests || reqRes.data || [];

    const pendingRequests = (Array.isArray(rawReqs) ? rawReqs : []).map(r => ({
      id: String(r.id ?? r.request_id ?? ""),
      fullName: String(r.full_name ?? r.fullName ?? r.name ?? "Unknown"),
      amountAda: (
        r.amount_ada != null
          ? Number(r.amount_ada).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
          : fmtAdaFromLovelace(r.amount_lovelace ?? 0)
      ),
      purpose: String(r.purpose ?? ""),
      category: String(r.category ?? ""),
      date: String(r.created_at ?? r.date ?? ""),
      status: String(r.status ?? "pending"),
      recipientAddress: String(r.recipient_address ?? r.addr ?? ""),
      justification: String(r.justification ?? r.reason ?? ""),
    }));

    // 3) recent activity
    // const txRes = await apiGet(ENDPOINT_RECENT);
    // const rawTx = txRes.items || txRes.transactions || [];
    // const recentActivity = (Array.isArray(rawTx) ? rawTx : []).map(t => ({
    //   type: String(t.type ?? "request"),
    //   title: String(t.title ?? (t.type === "deposit" ? "New Deposit" : t.type === "withdraw" ? "Withdrawal" : "Activity")),
    //   description: String(t.description ?? t.details ?? ""),
    //   time: String(t.created_at ?? t.time ?? ""),
    // }));

    const data = {
      // poolBalanceAdaText,
      poolTrend: undefined, // optional: compute trend if you store historical stats
      lastUpdated: new Date().toLocaleString(),
      pendingRequests,
      // recentActivity,
    };

    // cache for openReview
    window._treasurerData = data;

    renderTreasurerDashboard(data);
  }

  // --------- REVIEW NAV ----------
  window.openReview = function(requestId) {
    const req = window._treasurerData?.pendingRequests?.find(r => r.id === requestId);
    if (req) sessionStorage.setItem("cvReviewRequest", JSON.stringify(req));
    window.location.href = `review-request.html?id=${encodeURIComponent(requestId)}`;
  };

  // --------- WITHDRAW BUTTON ENABLE ----------
  function onWithdrawInput(input) {
    const val = parseFloat(input.value);
    document.getElementById("btnWithdraw").disabled = !(val > 0);
  }
  window.onWithdrawInput = onWithdrawInput;

  // --------- BOOT ----------
  document.addEventListener("DOMContentLoaded", () => {
    loadTreasurerDashboard().catch(err => {
      console.error("Treasurer dashboard load failed:", err);
      const badge = document.getElementById("proposalsBadge");
      if (badge) badge.textContent = "Error";
    });
  });
</script>
